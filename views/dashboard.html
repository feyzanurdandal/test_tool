<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Test Otomasyon Merkezi</title>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-4xl mx-auto py-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Test Otomasyon Merkezi</h1>
        <p class="text-slate-500 mb-10">Otonom test kontrol paneli</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <button onclick="window.location.href='/create-test'" class="bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition"> + Yeni Senaryo</button>
            <button onclick="window.location.href='/api/scenarios/reports-panel'" class="bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 transition">📊 Raporları İncele</button>
            <button onclick="runAllTests()" class="bg-amber-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-amber-600 transition">🚀 Hepsini Başlat</button>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-left">
            <h3 class="text-lg font-semibold mb-4 text-slate-700">Aktif Senaryo Yönetimi</h3>
            <select id="scenarioSelector" class="w-full p-3 border border-slate-300 rounded-lg mb-4"></select>
            <div class="flex gap-4">
                <button onclick="runSelected()" class="flex-1 bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-900 transition">▶️ Çalıştır</button>
                <button onclick="deleteSelected()" class="flex-1 bg-red-50 text-red-600 py-3 rounded-lg font-bold hover:bg-red-100 transition">🗑️ Sil</button>
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
