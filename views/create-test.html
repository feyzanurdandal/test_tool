<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Yeni Senaryo</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center py-10 px-4">
    <div class="w-full max-w-2xl bg-[#18181b] p-8 rounded-2xl border border-[rgba(255,255,255,0.08)] shadow-2xl">
        <div class="flex items-center justify-between mb-6 border-b border-[rgba(255,255,255,0.08)] pb-4">
            <h1 class="text-base font-bold text-white">Yeni Senaryo Oluştur</h1>
            <span class="text-[10px] font-mono text-[#71717a] bg-[#27272a] px-2 py-0.5 rounded">Auth Service</span>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-medium text-[#71717a] uppercase tracking-wider mb-1.5">Senaryo Adı</label>
                <input type="text" id="scenarioName" class="w-full p-3 bg-[#27272a] border border-zinc-700 rounded-lg text-xs text-white focus:border-[#3b82f6] outline-none" placeholder="Örn: OAuth2 Login - Google Provider">
            </div>

            <div>
                <label class="block text-[10px] font-medium text-[#71717a] uppercase tracking-wider mb-1.5">Hedef URL</label>
                <input type="text" id="targetUrl" class="w-full p-3 bg-[#27272a] border border-zinc-700 rounded-lg text-xs text-white focus:border-[#3b82f6] outline-none" placeholder="https://auth.acme.io/oauth/google">
            </div>

            <div>
                <label class="block text-[10px] font-medium text-[#71717a] uppercase tracking-wider mb-1.5">Test Adımları</label>
                <div id="stepsContainer" class="space-y-3 mb-2"></div>
                <button onclick="addStep()" class="inline-flex items-center gap-1 text-xs font-medium text-[#3b82f6] hover:underline mt-2">
                    + Yeni Adım Ekle
                </button>
            </div>
        </div>
        
        <div class="mt-8 flex gap-3 pt-6 border-t border-[rgba(255,255,255,0.08)]">
            <button onclick="saveScenario()" class="flex-1 bg-[#3b82f6] text-white py-2.5 rounded-lg text-xs font-bold border border-blue-700 hover:bg-blue-500 transition">Kaydet ve İşle</button>
            <button onclick="window.location.href='/'" class="bg-[#27272a] text-[#a1a1aa] px-5 py-2.5 rounded-lg text-xs font-medium border border-zinc-700 hover:text-[#fafafa] transition">Geri</button>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
