<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yapay Zeka Test Raporları Paneli</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        select { background-color: #fff; cursor: pointer; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #218838; }
        .card { border-left: 5px solid #007bff; background: #f8f9fa; padding: 20px; border-radius: 6px; margin-top: 20px; }
        .card.error { border-left-color: #dc3545; }
        .card.success { border-left-color: #28a745; }
        .data-item { margin: 10px 0; font-size: 15px; }
        .btn-back { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-back:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    </div>

</body>
</html>
