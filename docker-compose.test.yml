services:
  # 🛡️ Siber Güvenlik Katmanı (ZAP Resmi Webswing Yapılandırması)
  zap-proxy:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-proxy
    command: zap-webswing.sh
    restart: always
    ports:
      - "8082:8080" # 👈 Webswing Giriş Kapısı (Tarayıcıdan buraya gideceğiz)
      - "8090:8090" # 👈 Gerçek Proxy Kapısı (Playwright buradan sızacak)
    volumes:
      - ./security-reports:/zap/wrk:rw
    networks:
      - automation-network

  # 🚀 Ana Test Motoru (Playwright)
  playwright-runner:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    container_name: playwright-runner
    depends_on:
      - zap-proxy
    volumes:
      - .:/workspace
    working_dir: /workspace
    # 💡 MÜHENDİSLİK HİLESİ: Playwright hemen koşup patlamasın diye testten önce 15 saniye uyutuyoruz (ZAP'ı açmana süre tanır)
    command: sh -c "npm install && sleep 45 && npx playwright test"
    networks:
      - automation-network
    environment:
      - NODE_ENV=development
      - TEST_MODE=${TEST_MODE:-UI}
      - ZAP_PROXY_URL=http://zap-proxy:8090 # Dokümantasyonun emrettiği proxy portu!

networks:
  automation-network:
    driver: bridge