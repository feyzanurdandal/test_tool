events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # 🔒 Rate Limiting: IP başına saniyede 10 isteğe izin ver (DoS/Bot Koruması)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # 🛡️ Güvenlik Header'ları (Clickjacking, XSS ve Sniffing Koruması)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Statik Arayüz Dosyaları (Nginx Doğrudan Sunar)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # /api/ İstekleri için Rate Limiting & Node.js Proxy Tüneli
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay; # DoS Koruması Kapıda Devrede

            proxy_pass http://node-backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}